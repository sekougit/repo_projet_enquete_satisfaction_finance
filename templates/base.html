<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Satisfaction App{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        .sidebar a:hover {
            color: #00d1ff;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f4f6f9;
        }

        .logout {
            margin-top: 30px;
            display: block;
            color: red;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Menu</h3>

    <a href="/survey/upload/">📥 Chargement</a>
    <a href="/survey/preview/">📂 Base de données</a>
    <a href="/dashboard/">📊 Dashboard</a>

    <a class="logout" href="/accounts/logout/">🚪 Déconnexion</a>
</div>

<!-- CONTENT -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
