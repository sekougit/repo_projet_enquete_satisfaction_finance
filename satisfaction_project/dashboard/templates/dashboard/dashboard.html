{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

{% load plotly_dash %}

<div class="dashboard-wrapper">

    <h1>Dashboard Enquête de Satisfaction</h1>

    <div class="dash-container">
        {% plotly_app name="SatisfactionDashboard" %}
    </div>

</div>

<style>

/* RESET GLOBAL */
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    overflow-y: auto;   /* ✅ IMPORTANT : remettre le scroll vertical */
    background: #f4f6f9;
}

/* WRAPPER */
.dashboard-wrapper {
    width: 100%;
    min-height: 100vh;   /* ✅ au lieu de height fixe */
    padding: 10px;
    box-sizing: border-box;
}

/* TITRE */
.dashboard-wrapper h1 {
    text-align: center;
    color: #0d6efd;
    font-size: 26px;
    margin: 10px 0;
}

/* DASH AREA */
.dash-container {
    width: 100%;
    min-height: 80vh;   /* ✅ au lieu de height fixe */
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    overflow: visible;  /* ✅ IMPORTANT */
}

/* PLOTLY RESPONSIVE */
.plotly, .js-plotly-plot {
    width: 100% !important;
}

</style>

{% endblock %}
