{% extends "base.html" %}

{% block title %}
Base de données
{% endblock %}

{% block content %}

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>Base de données des enquêtes</h2>

        <a href="{% url 'export_csv' %}" class="export-btn">
            📥 Exporter CSV
        </a>
    </div>

    <!-- TABLE CONTAINER -->
    <div class="table-wrapper">

        <div class="table-card">

            <div class="table-scroll">

                {{ preview|safe }}

            </div>

        </div>

    </div>

</div>

<style>

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 2px 12px rgba(0,0,0,0.08);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

h2 {
    margin: 0;
}

/* EXPORT BUTTON */
.export-btn {
    background: #28a745;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

.export-btn:hover {
    background: #218838;
}

/* WRAPPER */
.table-wrapper {
    margin-top: 15px;
}

/* CARD */
.table-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #eee;
    overflow: hidden;
}

/* SCROLL AREA */
.table-scroll {
    max-height: 75vh;
    overflow: auto;
}

/* TABLE STYLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px; /* important pour colonnes */
}

/* HEADER FIXE */
th {
    position: sticky;
    top: 0;
    background: #007bff;
    color: white;
    padding: 10px;
    text-align: left;
    z-index: 2;
}

/* CELLS */
td {
    padding: 8px;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
}

/* STRIPED */
tr:nth-child(even) {
    background: #f9f9f9;
}

/* HOVER */
tr:hover {
    background: #eef6ff;
}

/* SCROLLBAR */
.table-scroll::-webkit-scrollbar {
    height: 8px;
    width: 8px;
}

.table-scroll::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 4px;
}

</style>

{% endblock %}
